packages:
  - packages/*

allowBuilds:
  esbuild: true
  sharp: true

minimumReleaseAgeExclude:
  - astro@6.4.4
  - esbuild@0.28.1

onlyBuiltDependencies:
  - '@tailwindcss/oxide'
  - esbuild
  - sharp

overrides:
  esbuild@>=0.17.0 <0.28.1: ^0.28.1
  esbuild@>=0.27.3 <0.28.1: ^0.28.1
  yaml@>=2.0.0 <2.8.3: '>=2.8.3'
